<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBI — Print Document</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:Arial,sans-serif; background:#e5e5e5; }

  .screen-bar {
    background:#131921; color:#fff; padding:12px 20px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .screen-bar h1 { font-size:15px; font-weight:800; }
  .print-btn {
    background:#f97316; color:#fff; border:none;
    padding:9px 22px; border-radius:6px; font-size:14px;
    font-weight:800; cursor:pointer;
  }
  .print-btn:hover { background:#ea580c; }

  .doc-wrap {
    max-width:700px; margin:24px auto; background:#fff;
    box-shadow:0 2px 12px rgba(0,0,0,.15);
  }
  #docContent { padding:0; }

  /* Loading state */
  .loading {
    text-align:center; padding:60px 20px; color:#555;
  }
  .spinner {
    display:inline-block; width:32px; height:32px;
    border:3px solid #ddd; border-top-color:#f97316;
    border-radius:50%; animation:spin .7s linear infinite;
    margin-bottom:14px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Print styles */
  @media print {
    body { background:#fff; }
    .screen-bar { display:none !important; }
    .doc-wrap { margin:0; box-shadow:none; max-width:100%; }
    #docContent { padding:0; }
  }
</style>
</head>
<body>

<!-- Top bar (hidden when printing) -->
<div class="screen-bar">
  <div>
    <div style="font-size:12px;opacity:.7;margin-bottom:2px;">IBI Marketplace</div>
    <h1 id="docTitle">Loading Document…</h1>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="print-btn" onclick="window.print()">🖨️ Print</button>
    <button onclick="window.close()" style="background:rgba(255,255,255,.15);color:#fff;border:none;padding:9px 16px;border-radius:6px;font-size:13px;cursor:pointer;">✕ Close</button>
  </div>
</div>

<div class="doc-wrap">
  <div id="docContent">
    <div class="loading">
      <div class="spinner"></div><br>
      Loading your document…<br>
      <small style="color:#888;font-size:12px;margin-top:8px;display:block;">
        Fetching order details from IBI server
      </small>
    </div>
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyJw77dIdd0f2e8UDJIRefW_f07UH_5KWtoAyJ3iA-i6NaZWCXrCLy4t3IY-_vr7sq9/exec';

const params  = new URLSearchParams(window.location.search);
const type    = params.get('type')  || 'invoice';   // invoice | shipping
const orderId = params.get('order') || '';

document.getElementById('docTitle').textContent =
  type === 'shipping' ? 'Shipping Label — ' + orderId : 'Tax Invoice — ' + orderId;

// Fetch order from Google Sheets
function ibi_fetch(p, cb) {
  const cbName = '_p_' + Date.now();
  const url = SHEET_URL + '?' + new URLSearchParams(p).toString() + '&callback=' + cbName;
  let done = false;
  const timer = setTimeout(() => { if(!done){done=true;cb(null);} }, 10000);
  window[cbName] = res => {
    if(done) return; done=true; clearTimeout(timer);
    window[cbName]=null;
    const s=document.getElementById(cbName); if(s) s.remove();
    cb(res);
  };
  const s = document.createElement('script');
  s.id = cbName; s.src = url;
  s.onerror = () => { if(!done){done=true;clearTimeout(timer);cb(null);} };
  document.head.appendChild(s);
}

function showError(msg) {
  document.getElementById('docContent').innerHTML =
    '<div style="text-align:center;padding:48px 24px;">' +
    '<div style="font-size:48px;margin-bottom:16px;">⚠️</div>' +
    '<div style="font-size:18px;font-weight:700;color:#c00;margin-bottom:8px;">Document Not Found</div>' +
    '<p style="font-size:14px;color:#555;margin-bottom:20px;">' + msg + '</p>' +
    '<p style="font-size:13px;color:#888;">Order ID: <strong>' + orderId + '</strong></p>' +
    '<div style="margin-top:20px;display:flex;gap:10px;justify-content:center;">' +
    '<a href="https://indiabusinessinternational.github.io/Online/" style="padding:10px 20px;background:#131921;color:#fff;border-radius:6px;text-decoration:none;font-weight:700;font-size:13px;">← Go to Website</a>' +
    '<a href="https://wa.me/918939414799?text=Hi+IBI!+I+need+my+invoice+for+Order+' + orderId + '" target="_blank" style="padding:10px 20px;background:#25D366;color:#fff;border-radius:6px;text-decoration:none;font-weight:700;font-size:13px;">💬 WhatsApp IBI</a>' +
    '</div>' +
    '</div>';
}

function renderInvoice(order) {
  const o = order;
  let items = [];
  try { items = JSON.parse(o.items || '[]'); } catch(e) { items = []; }

  const itemRows = items.map((it,i) =>
    '<tr style="border-bottom:1px solid #eee;">' +
    '<td style="padding:8px 12px;font-size:12px;">'+(i+1)+'</td>' +
    '<td style="padding:8px 12px;font-size:12px;">'+(it.title||'')+'</td>' +
    '<td style="padding:8px 12px;font-size:12px;text-align:center;">'+(it.qty||1)+'</td>' +
    '<td style="padding:8px 12px;font-size:12px;text-align:right;">&#8377;'+(parseFloat(it.price||0).toLocaleString('en-IN'))+'</td>' +
    '<td style="padding:8px 12px;font-size:12px;text-align:right;font-weight:700;">&#8377;'+(parseFloat(it.total||0).toLocaleString('en-IN'))+'</td>' +
    '</tr>'
  ).join('');

  const total = parseFloat(o.total||0);

  return '<div style="font-family:Arial,sans-serif;border:1.5px solid #333;">' +

    // Header
    '<div style="border-bottom:2px solid #333;padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-end;">' +
    '<div>' +
    '<div style="font-size:16px;font-weight:900;">INDIA BUSINESS INTERNATIONAL</div>' +
    '<div style="font-size:10px;color:#555;margin-top:2px;">Palapallam PO, Kanyakumari Dist, Tamil Nadu – 629159</div>' +
    '<div style="font-size:10px;color:#555;">Ph: +91 89394 14799 | indiabusinessinternational@gmail.com</div>' +
    '</div>' +
    '<div style="text-align:right;">' +
    '<div style="font-size:13px;font-weight:800;border:1.5px solid #333;padding:4px 10px;">TAX INVOICE</div>' +
    '<div style="font-size:10px;color:#555;margin-top:3px;">Invoice No: INV-'+o.orderId+'</div>' +
    '</div>' +
    '</div>' +

    // Meta
    '<div style="background:#f7f7f7;border-bottom:1px solid #ddd;padding:8px 16px;display:flex;justify-content:space-between;">' +
    '<span style="font-size:11px;"><strong>Order ID:</strong> '+o.orderId+'</span>' +
    '<span style="font-size:11px;"><strong>Date:</strong> '+o.orderDate+'</span>' +
    '</div>' +

    // Sold By & Ship To
    '<div style="display:flex;border-bottom:1px solid #ddd;">' +
    '<div style="flex:1;padding:10px 16px;border-right:1px solid #ddd;">' +
    '<div style="font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid #ddd;padding-bottom:3px;margin-bottom:6px;">SOLD BY</div>' +
    '<div style="font-size:12px;font-weight:700;">India Business International</div>' +
    '<div style="font-size:11px;color:#444;line-height:1.7;">Palapallam PO, Kanyakumari Dist<br>Tamil Nadu – 629159<br>+91 89394 14799</div>' +
    '</div>' +
    '<div style="flex:1;padding:10px 16px;">' +
    '<div style="font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid #ddd;padding-bottom:3px;margin-bottom:6px;">BILL &amp; SHIP TO</div>' +
    '<div style="font-size:12px;font-weight:700;">'+o.customerName+'</div>' +
    '<div style="font-size:11px;color:#444;line-height:1.7;">'+o.address+'<br>Mobile: +91'+o.customerMobile+(o.customerEmail ? '<br>'+o.customerEmail : '')+'</div>' +
    '</div>' +
    '</div>' +

    // Table
    '<table style="width:100%;border-collapse:collapse;">' +
    '<thead><tr style="border-bottom:1.5px solid #333;">' +
    '<th style="padding:8px 12px;font-size:11px;text-align:left;">#</th>' +
    '<th style="padding:8px 12px;font-size:11px;text-align:left;">Product Description</th>' +
    '<th style="padding:8px 12px;font-size:11px;text-align:center;">Qty</th>' +
    '<th style="padding:8px 12px;font-size:11px;text-align:right;">Unit Price</th>' +
    '<th style="padding:8px 12px;font-size:11px;text-align:right;">Amount</th>' +
    '</tr></thead>' +
    '<tbody>' + (itemRows || '<tr><td colspan="5" style="padding:10px 12px;font-size:12px;text-align:center;color:#888;">Items data not available</td></tr>') + '</tbody>' +
    '</table>' +

    // Totals
    '<div style="padding:10px 16px;border-top:1.5px solid #333;">' +
    '<table style="width:100%;font-size:12px;border-collapse:collapse;">' +
    '<tr><td style="padding:3px 0;">Subtotal</td><td style="text-align:right;">&#8377;'+total.toLocaleString('en-IN')+'</td></tr>' +
    '<tr><td style="padding:3px 0;">Shipping</td><td style="text-align:right;color:#16a34a;">FREE</td></tr>' +
    '<tr><td style="padding:3px 0;">Tax (GST)</td><td style="text-align:right;">Included</td></tr>' +
    '<tr style="border-top:1.5px solid #333;font-size:14px;font-weight:900;">' +
    '<td style="padding:8px 0;">GRAND TOTAL</td>' +
    '<td style="text-align:right;padding:8px 0;">&#8377;'+total.toLocaleString('en-IN')+'</td></tr>' +
    '</table>' +
    '</div>' +

    // Declaration
    '<div style="border-top:1px solid #ddd;padding:8px 16px;font-size:10px;color:#555;">' +
    'Goods are sold for end-user consumption only. Not for resale. Check package before accepting.<br>' +
    'Report damage within 24 hours: +91 89394 14799' +
    '</div>' +

    // Footer
    '<div style="border-top:1.5px solid #333;padding:8px 16px;display:flex;justify-content:space-between;font-size:10px;">' +
    '<span>This is a computer-generated invoice.</span>' +
    '<span><strong>For INDIA BUSINESS INTERNATIONAL</strong></span>' +
    '</div>' +
    '</div>';
}

function renderShipping(order) {
  const o = order;
  const total = parseFloat(o.total||0);
  let items = [];
  try { items = JSON.parse(o.items || '[]'); } catch(e) {}

  return '<div style="font-family:Arial,sans-serif;border:2px solid #333;">' +

    // Header
    '<div style="border-bottom:2px solid #333;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;">' +
    '<div>' +
    '<div style="font-size:16px;font-weight:900;letter-spacing:.5px;">INDIA BUSINESS INTERNATIONAL</div>' +
    '<div style="font-size:10px;color:#555;">eCommerce for the World | iINTELLIGENCEi</div>' +
    '</div>' +
    '<div style="font-size:12px;font-weight:700;border:1.5px solid #333;padding:4px 10px;">SHIPPING LABEL</div>' +
    '</div>' +

    // AWB
    '<div style="border-bottom:1px solid #ddd;padding:10px 16px;display:flex;align-items:center;gap:16px;">' +
    '<div style="flex:1;">' +
    '<div style="font-family:monospace;font-size:24px;letter-spacing:3px;line-height:1;">||| |||| ||| |||||| ||| |||</div>' +
    '<div style="font-size:11px;margin-top:3px;"><strong>AWB / Order ID:</strong> '+o.orderId+'</div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">' +
    '<div style="border:1px solid #333;padding:5px 10px;font-size:11px;font-weight:700;text-align:center;">SUR</div>' +
    '<div style="border:1px solid #333;padding:5px 10px;font-size:11px;font-weight:700;text-align:center;">1 kg</div>' +
    '<div style="border:1px solid #333;padding:5px 10px;font-size:11px;font-weight:700;text-align:center;">STD</div>' +
    '<div style="border:1px solid #333;padding:5px 10px;font-size:11px;font-weight:700;text-align:center;">PREPAID</div>' +
    '</div>' +
    '</div>' +

    // SHIP TO
    '<div style="border-bottom:1px solid #ddd;padding:12px 16px;display:flex;gap:16px;">' +
    '<div style="flex:1;">' +
    '<div style="font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:5px;">SHIP TO:</div>' +
    '<div style="font-size:18px;font-weight:900;">'+o.customerName+'</div>' +
    '<div style="font-size:12px;line-height:1.8;margin-top:5px;">'+o.address+'</div>' +
    '<div style="font-size:13px;font-weight:700;margin-top:5px;">📱 +91'+o.customerMobile+'</div>' +
    '</div>' +
    '<div style="border-left:1px solid #ddd;padding-left:16px;min-width:170px;">' +
    '<div style="font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:6px;">ORDER DETAILS:</div>' +
    '<div style="font-size:11px;line-height:1.9;">' +
    '<strong>Order ID:</strong> '+o.orderId+'<br>' +
    '<strong>Date:</strong> '+o.orderDate+'<br>' +
    '<strong>Items:</strong> '+items.length+'<br>' +
    '<strong style="font-size:14px;">Total: &#8377;'+total.toLocaleString('en-IN')+'</strong>' +
    '</div>' +
    '</div>' +
    '</div>' +

    // Sold By
    '<div style="border-bottom:1px solid #ddd;padding:8px 16px;font-size:11px;">' +
    '<strong>SOLD BY:</strong> India Business International | Palapallam PO, Kanyakumari – 629159 | indiabusinessinternational@gmail.com | +91 89394 14799' +
    '</div>' +

    // Declaration
    '<div style="border-bottom:1px solid #ddd;padding:7px 16px;font-size:10px;color:#444;">' +
    'Customer Declaration: Goods sold for end-user consumption only. Not for resale. Check package before accepting. Report damage within 24 hours.' +
    '</div>' +

    // Bottom bar
    '<div style="border-top:2px solid #333;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;">' +
    '<span style="font-size:15px;font-weight:900;">IBI</span>' +
    '<span style="font-size:15px;font-weight:900;">TN29</span>' +
    '<span style="font-size:15px;font-weight:900;">'+o.orderId.slice(-4)+'</span>' +
    '<span style="font-size:15px;font-weight:900;border:2px solid #333;padding:3px 10px;">PREPAID</span>' +
    '</div>' +
    '</div>';
}

// ── Try localStorage first (fastest — works offline too) ──
function loadFromLocalStorage() {
  try {
    const cache = JSON.parse(localStorage.getItem('ibi_order_cache') || '{}');
    // Check same-origin (print.html on same domain as website)
    const keys = Object.keys(cache);
    // Try exact match first
    if (cache[orderId]) return cache[orderId];
    // Try case-insensitive match
    const match = keys.find(k => k.toLowerCase() === orderId.toLowerCase());
    return match ? cache[match] : null;
  } catch(e) { return null; }
}

function loadAndRender(order) {
  if (!order) return false;
  const html = type === 'shipping' ? renderShipping(order) : renderInvoice(order);
  document.getElementById('docContent').innerHTML = html;
  document.getElementById('docTitle').textContent =
    (type === 'shipping' ? 'Shipping Label' : 'Tax Invoice') + ' — ' + order.orderId;
  setTimeout(function() { window.print(); }, 800);
  return true;
}

if (!orderId) {
  showError('No Order ID provided in the URL.<br><br>Please click the print link from your order confirmation email, or contact IBI on WhatsApp.');
} else {
  // Step 1: Try localStorage (instant)
  const cached = loadFromLocalStorage();
  if (cached && loadAndRender(cached)) {
    // done!
  } else {
    // Step 2: Try Google Sheets
    ibi_fetch({ action:'getAdminOrders', adminKey:'IBI_ADMIN_2026' }, function(res) {
      if (res && res.success) {
        const order = (res.orders||[]).find(o => o.orderId === orderId);
        if (order && loadAndRender(order)) return;
      }
      // Step 3: Show helpful error with options
      showError(
        'Order <strong>' + orderId + '</strong> not found.<br><br>' +
        'This can happen if:<br>' +
        '• You opened the link on a different device/browser<br>' +
        '• The order was not saved yet<br><br>' +
        'Please WhatsApp IBI with your Order ID to get the invoice.'
      );
    });
  }
}
</script>
</body>
</html>
